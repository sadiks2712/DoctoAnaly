<div class="upload-wrapper">
  <div class="upload-card fade-up">

    <div class="upload-icon">📁</div>

    <h2>Upload Healthcare Dataset</h2>

    <p class="upload-sub">
      Upload your CSV file to analyze disease trends.
    </p>

    <label class="file-label">
      <input
        type="file"
        (change)="onFileSelected($event)"
        accept=".csv"
        />
        <span>Choose CSV File</span>
      </label>

      <button
        class="upload-btn"
        (click)="upload()"
        [disabled]="loading"
        >
        @if (!loading) {
          <span>🚀 Upload & Analyze</span>
        }
        @if (loading) {
          <span>Uploading...</span>
        }
      </button>

      <!-- ✅ SUCCESS ANIMATION -->
      @if (showSuccess) {
        <div class="success-box">
          <div class="checkmark"></div>
          <p>Upload Successful!</p>
        </div>
      }

      @if (message && !showSuccess) {
        <p class="message">
          {{ message }}
        </p>
      }

    </div>
  </div>
